name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Note: Submodule repos are private. CI runs in each submodule repo separately.
# This workflow validates monorepo-level files only.

jobs:
  validate:
    name: Validate Monorepo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          test -f CLAUDE.md || (echo "Missing CLAUDE.md" && exit 1)
          test -f .env.example || (echo "Missing .env.example" && exit 1)
          test -f package.json || (echo "Missing package.json" && exit 1)
          echo "All required files present"

      - name: Validate .gitmodules
        run: |
          test -f .gitmodules || (echo "Missing .gitmodules" && exit 1)
          echo "Submodules configured:"
          cat .gitmodules
