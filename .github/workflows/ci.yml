name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test
        env:
          # Minimal env vars for tests
          SOLANA_RPC_URL: https://api.devnet.solana.com
          PROGRAM_ID: TRDXCHHWWZdQXxkGFJxek1KU2hn19687xztNBy99Ca1
          ADMIN_PASSWORD: test_password_only
          KEYPAIR_PATH: ./test-keypair.json

  frontend:
    name: Frontend Tests & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
        env:
          BUN_PUBLIC_BACKEND_URL: http://localhost:3000
          BUN_PUBLIC_SOLANA_NETWORK: devnet

  program:
    name: Program Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: program

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: bun install

      - name: Build program
        run: cargo build-sbf
        env:
          CARGO_TERM_COLOR: always

      - name: Run Rust tests
        run: cargo test
        env:
          CARGO_TERM_COLOR: always
